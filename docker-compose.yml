services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      ALLOW_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      BRIAN_AI_DATA_DIR: /data
    volumes:
      - ./data:/data
  frontend:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
